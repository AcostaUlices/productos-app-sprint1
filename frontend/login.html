<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Tienda de Hardware</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="logo-header">
      <img src="img/icono.png" alt="Altair Tech" class="logo-icono">
      <img src="img/wordmark.png" alt="Altair Tech" class="logo-wordmark">
    </div>
  </header>

  <main class="login-layout">

    <div class="logo-login">
      <img src="img/logo-completo.png" alt="Altair Tech">
    </div>

    <section class="formulario-container">
      <h2>Iniciar sesión</h2>
      <form id="form-login" novalidate>
        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" required>

        <button type="submit">Ingresar</button>
      </form>
      <p style="text-align: center; margin-top: 1rem;">
        ¿No tenés cuenta? <a href="register.html">Registrate</a>
      </p>
    </section>

  </main>

  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-box" id="modal-box">
      <p id="modal-mensaje"></p>
      <button id="modal-cerrar">Aceptar</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>

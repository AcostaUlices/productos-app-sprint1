<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Tienda de Hardware</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h2>Tienda de Hardware</h2>
  </header>

  <main>
    <section class="formulario-container" style="max-width: 400px; margin: 0 auto;">
      <h2>Crear cuenta</h2>
      <form id="form-register" novalidate>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" required>

        <button type="submit">Registrarme</button>
      </form>
      <p style="text-align: center; margin-top: 1rem;">
        ¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a>
      </p>
    </section>
  </main>

  <!-- Modal de alerta -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-box" id="modal-box">
      <p id="modal-mensaje"></p>
      <button id="modal-cerrar">Aceptar</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios - Tienda de Hardware</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h2>Tienda de Hardware</h2>
  </header>

  <nav id="navbar" class="navbar">
    <span id="navbar-usuario"></span>
    <a href="index.html">Productos</a>
    <a href="login.html" id="link-login">Iniciar sesión</a>
    <button id="btn-logout" style="display: none;">Cerrar sesión</button>
  </nav>

  <main>
    <section class="listado-container">
      <h2>Gestión de Usuarios</h2>
      <table id="tabla-usuarios">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-usuarios-body">
          <!-- Se llena con JS -->
        </tbody>
      </table>
    </section>
  </main>

  <!-- Modal de alerta -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-box" id="modal-box">
      <p id="modal-mensaje"></p>
      <button id="modal-cerrar">Aceptar</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/usersApi.js"></script>
  <script src="js/usersApp.js"></script>
</body>
</html>

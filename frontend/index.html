<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de Hardware</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h2>Tienda de Hardware</h2>
  </header>

  <main>
    <!-- Formulario para crear/editar -->
    <section class="formulario-container">
      <h2 id="form-titulo">Nuevo Producto</h2>
      <form id="form-producto"  novalidate>
        <input type="hidden" id="producto-id">

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required>

        <label for="categoria">Categoría</label>
        <select id="categoria" required>
          <option value="">Seleccionar...</option>
          <option value="Monitor">Monitor</option>
          <option value="Perifericos">Periféricos</option>
          <option value="GPU">GPU</option>
          <option value="CPU">CPU</option>
          <option value="RAM">RAM</option>
          <option value="Almacenamiento">Almacenamiento</option>
          <option value="Motherboard">Motherboard</option>
          <option value="Fuente">Fuente</option>
        </select>

        <label for="precio">Precio</label>
        <input type="number" id="precio" step="0.01" min="0" required>

        <label for="stock">Stock</label>
        <input type="number" id="stock" min="0" required>

        <label for="descripcion">Descripción</label>
        <textarea id="descripcion"></textarea>

        <div id="mensaje-form"></div>

        <button type="submit" id="btn-submit">Crear Producto</button>
        <button type="button" id="btn-cancelar" style="display: none;">Cancelar</button>
      </form>
    </section>

    <!-- Listado de productos -->
    <section class="listado-container">
      <h2>Productos</h2>
      <div id="mensaje-global"></div>
      <table id="tabla-productos">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <!-- Se llena con JS -->
        </tbody>
      </table>
    </section>
  </main>

    <!-- Modal de alerta -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-box" id="modal-box">
      <p id="modal-mensaje"></p>
      <button id="modal-cerrar">Aceptar</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
